<!doctype html>
<html>
  <head>
    <title>Panel de Aula</title>
  </head>
  <body>
    <h1>Panel de Aula</h1>

    <h2>A) Frase aleatoria</h2>
    <p id="frase"></p>
    <button id="btn-frase">Frase aleatoria</button>

    <h2>B) Lista de tareas</h2>
    <input id="input-tarea" type="text" placeholder="Nueva tarea" />
    <button id="btn-añadir">Añadir tarea</button>
    <button id="btn-vaciar">Vaciar lista</button>
    <ul id="lista"></ul>

    <h2>C) Ayuda e inspección</h2>
    <button id="btn-ayuda">Abrir ayuda</button>
    <button id="btn-cerrar">Cerrar ayuda</button>
    <button id="btn-inspeccion">Activar inspección</button>
    <p id="estado"></p>

    <script>
      let frases = ["Hola", "Adiós", "Bienvenido"];

      let btnFrase = document.getElementById("btn-frase");
      let parrafoFrase = document.getElementById("frase");

      function colorAleatorio() {
        let r = Math.floor(Math.random() * 256);
        let g = Math.floor(Math.random() * 256);
        let b = Math.floor(Math.random() * 256);
        return "rgb(" + r + "," + g + "," + b + ")";
      }

      btnFrase.addEventListener("click", function () {
        let indice = Math.floor(Math.random() * frases.length);
        parrafoFrase.textContent = frases[indice];
        parrafoFrase.style.color = colorAleatorio();
        btnFrase.style.color = colorAleatorio();
      });
    </script>
  </body>
</html>
